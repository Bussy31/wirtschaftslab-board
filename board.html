<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>wirtschaftslab-board</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .widget.ghost-mode {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            resize: none !important; /* DAS VERSTECKT DIE STRICHE UNTEN RECHTS! */
        }
        .widget.ghost-mode .widget-header {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .widget.ghost-mode:hover .widget-header {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="app">
    <div :class="['toolbar', { 'hidden': isFullscreen }]">
        <div class="brand">🎓 wirtschaftslab-board</div>

        <button class="btn-primary" @click="addWidget('uhr', '⏱️')">⏱️ Uhr</button>
        <button class="btn-primary" @click="addWidget('countdown', '⏳')">⏳ Timer</button>
        <button class="btn-primary" @click="addWidget('stoppuhr', '⏲️')">⏲️ Stoppuhr</button>
        <button class="btn-primary" @click="addWidget('notiz', '📝')">📝 Notiz</button>
        <button class="btn-primary" @click="addWidget('zufall', '🎲')">🎲 Zufall</button>
        <button class="btn-primary" @click="addWidget('qr', '📱')">📱 QR-Code</button>
        <button class="btn-primary" @click="addWidget('handlungsplan', '📋')">📋 Handlungsplan</button>

        <div style="flex-grow: 1;"></div>

        <button @click="toggleFullscreen" class="btn-primary" title="Vollbild an/aus">{{ isFullscreen ? '🗗' : '⛶' }}</button>
        <button @click="exportBoard" class="btn-export btn-small">💾 Export</button>
        <button @click="$refs.fileInput.click()" class="btn-import btn-small">📂 Import</button>
        <input type="file" ref="fileInput" @change="importBoard" style="display: none" accept=".json">
    </div>

    <div class="board">
        <div v-for="(w, index) in widgets"
             :key="w.id"
             :class="['widget', { 'ghost-mode': w.isTransparent }]"
             :style="{
                 left: w.x + 'px', top: w.y + 'px', width: w.width + 'px', height: w.height + 'px',
                 boxSizing: 'border-box'
             }"
             @mousedown="startDrag($event, index)">
             @touchstart="startDrag($event, index)">
            <div class="widget-header">
                <div class="widget-title">
                    <span>{{ w.icon }}</span>
                    <span>{{ w.type.toUpperCase() }}</span>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">

                    <button v-if="w.type === 'countdown' && w.timeLeft > 0" @click.stop="w.isRunning = !w.isRunning; saveToLocal()"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; color: white; cursor: pointer; height: 24px;"
                            title="Pause / Weiter">
                        {{ w.isRunning ? '⏸' : '▶' }}
                    </button>
                    <button v-if="w.type === 'countdown' && w.timeLeft > 0" @click.stop="w.resetTrigger = Date.now(); saveToLocal()"
                            style="background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4); border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; color: #fca5a5; cursor: pointer; height: 24px;"
                            title="Stopp">
                        ⏹
                    </button>

                    <button @click.stop="w.isTransparent = !w.isTransparent; saveToLocal()"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; color: white; cursor: pointer; height: 24px;">
                        {{ w.isTransparent ? '👁️' : '👻' }}
                    </button>

                    <button v-if="w.type === 'uhr'" @click.stop="w.isAnalog = !w.isAnalog; saveToLocal()"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; color: white; cursor: pointer; height: 24px;">
                        {{ w.isAnalog ? aktuelleZeit : '⌚' }}
                    </button>

                    <button v-if="w.type === 'handlungsplan'" @click.stop="w.isVisual = !w.isVisual; saveToLocal()"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; color: white; cursor: pointer; height: 24px;"
                            title="Ansicht wechseln">
                        {{ w.isVisual ? '📋' : '🗺️' }}
                    </button>


                    <span class="close-btn" @click.stop="removeWidget(index)">✖</span>
                </div>
            </div>

            <div class="widget-content">
                <component :is="w.type + '-widget'" :widget-data="w" @save="saveToLocal"></component>
            </div>
        </div>
    </div>
    <button v-if="isFullscreen" @click="toggleFullscreen" class="floating-exit-btn" title="Vollbild beenden">🗗 Beenden</button>
    <div class="copyright">© 2026 Philipp Bußmann</div>
</div>

<script src="widgets/uhr.js"></script>
<script src="widgets/notiz.js"></script>
<script src="widgets/countdown.js"></script>
<script src="widgets/stoppuhr.js"></script>
<script src="widgets/zufall.js"></script>
<script src="widgets/qr.js"></script>
<script src="widgets/handlungsplan.js"></script>
<script src="app.js"></script>

</body>
</html>
