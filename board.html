<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>wirtschaftslab-board</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .widget.ghost-mode {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            resize: none !important;
        }
        .widget.ghost-mode .widget-header {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .widget.ghost-mode:hover .widget-header {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="toolbar">
        <div class="brand">🎓 wirtschaftslab-board</div>

        <button class="btn-primary" @click="addWidget('uhr', '⏱️')">⏱️ Uhr</button>
        <button class="btn-primary" @click="addWidget('countdown', '⏳')">⏳ Timer</button>
        <button class="btn-primary" @click="addWidget('stoppuhr', '⏲️')">⏲️ Stoppuhr</button>
        <button class="btn-primary" @click="addWidget('notiz', '📝')">📝 Notiz</button>

        <div style="flex-grow: 1;"></div>

        <button @click="$refs.bgInput.click()" class="btn-import">🖼️ Hintergrund</button>
        <input type="file" ref="bgInput" @change="onBgSelected" style="display: none" accept="image/*">

        <button @click="exportBoard" class="btn-export">💾 Export</button>
        <button @click="$refs.fileInput.click()" class="btn-import">📂 Import</button>
        <input type="file" ref="fileInput" @change="importBoard" style="display: none" accept=".json">
    </div>

    <div class="board" :style="boardBackgroundStyle">

        <div v-for="(w, index) in widgets"
             :key="w.id"
             :class="['widget', { 'ghost-mode': w.isTransparent }]"
             :style="{
                 left: w.x + 'px', top: w.y + 'px', width: w.width + 'px', height: w.height + 'px',
                 boxSizing: 'border-box'
             }"
             @mousedown="startDrag($event, index)">

            <div class="widget-header">
                <div class="widget-title">
                    <span>{{ w.icon }}</span>
                    <span>{{ w.type.toUpperCase() }}</span>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">
                    <button @click.stop="w.isTransparent = !w.isTransparent; saveToLocal()"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; color: white; cursor: pointer; height: 24px;">
                        {{ w.isTransparent ? '👁️' : '👻' }}
                    </button>

                    <button v-if="w.type === 'uhr'" @click.stop="w.isAnalog = !w.isAnalog; saveToLocal()"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; color: white; cursor: pointer; height: 24px;">
                        {{ w.isAnalog ? aktuelleZeit : '⌚' }}
                    </button>

                    <span class="close-btn" @click.stop="removeWidget(index)">✖</span>
                </div>
            </div>

            <div class="widget-content">
                <component :is="w.type + '-widget'" :widget-data="w" @save="saveToLocal"></component>
            </div>
        </div>
    </div>

    <div v-if="bgPreviewUrl" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="background: #2a2a2a; padding: 25px; border-radius: 12px; width: 90vw; max-width: 600px; display: flex; flex-direction: column; gap: 15px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h3 style="margin: 0; font-family: sans-serif;">🖼️ Hintergrund anpassen</h3>

            <div style="width: 100%; height: 300px; border: 2px dashed #555; border-radius: 8px; overflow: hidden; background: #000;">
                <div style="width: 100%; height: 100%;" :style="previewBackgroundStyle"></div>
            </div>

            <div style="display: flex; gap: 10px; align-items: center; font-family: sans-serif;">
                <label>Darstellung:</label>
                <select v-model="bgMode" style="padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 6px; flex-grow: 1;">
                    <option value="cover">Vollbild (ohne Ränder, evtl. beschnitten)</option>
                    <option value="contain">Einpassen (Ganzes Bild, evtl. mit Rändern)</option>
                    <option value="tile">Kacheln (Muster wiederholen)</option>
                </select>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                <button @click="cancelBackground" style="padding: 10px 16px; background: transparent; color: white; border: 1px solid #555; border-radius: 6px; cursor: pointer;">Abbrechen</button>
                <button @click="applyBackground" style="padding: 10px 16px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">✅ Anwenden</button>
            </div>
        </div>
    </div>
</div>

<script src="widgets/uhr.js"></script>
<script src="widgets/notiz.js"></script>
<script src="widgets/countdown.js"></script>
<script src="widgets/stoppuhr.js"></script>
<script src="app.js"></script>

</body>
</html>
