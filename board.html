<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>wirtschaftslab-board</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .widget.ghost-mode {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            resize: none !important;
        }
        .widget.ghost-mode .widget-header {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .widget.ghost-mode:hover .widget-header {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="toolbar">
        <div class="brand">🎓 wirtschaftslab-board</div>

        <button class="btn-primary" @click="addWidget('uhr', '⏱️')">⏱️ Uhr</button>
        <button class="btn-primary" @click="addWidget('countdown', '⏳')">⏳ Timer</button>
        <button class="btn-primary" @click="addWidget('stoppuhr', '⏲️')">⏲️ Stoppuhr</button>
        <button class="btn-primary" @click="addWidget('notiz', '📝')">📝 Notiz</button>

        <div style="flex-grow: 1;"></div>

        <button @click="showGallery = true" class="btn-import">🖼️ Galerie</button>

        <button @click="exportBoard" class="btn-export">💾 Export</button>
        <button @click="$refs.fileInput.click()" class="btn-import">📂 Import</button>
        <input type="file" ref="fileInput" @change="importBoard" style="display: none" accept=".json">
    </div>

    <div class="board" :style="{
            backgroundImage: backgroundImage ? 'url(' + backgroundImage + ')' : 'none',
            backgroundSize: 'cover',
            backgroundPosition: 'center'
         }">

        <div v-for="(w, index) in widgets"
             :key="w.id"
             :class="['widget', { 'ghost-mode': w.isTransparent }]"
             :style="{
                 left: w.x + 'px', top: w.y + 'px', width: w.width + 'px', height: w.height + 'px',
                 boxSizing: 'border-box'
             }"
             @mousedown="startDrag($event, index)">

            <div class="widget-header">
                <div class="widget-title">
                    <span>{{ w.icon }}</span>
                    <span>{{ w.type.toUpperCase() }}</span>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">
                    <button @click.stop="w.isTransparent = !w.isTransparent; saveToLocal()"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; color: white; cursor: pointer; height: 24px;">
                        {{ w.isTransparent ? '👁️' : '👻' }}
                    </button>

                    <button v-if="w.type === 'uhr'" @click.stop="w.isAnalog = !w.isAnalog; saveToLocal()"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; color: white; cursor: pointer; height: 24px;">
                        {{ w.isAnalog ? aktuelleZeit : '⌚' }}
                    </button>

                    <span class="close-btn" @click.stop="removeWidget(index)">✖</span>
                </div>
            </div>

            <div class="widget-content">
                <component :is="w.type + '-widget'" :widget-data="w" @save="saveToLocal"></component>
            </div>
        </div>
    </div>

    <div v-if="showGallery" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(5px);">
        <div style="background: #2a2a2a; padding: 25px; border-radius: 12px; width: 90vw; max-width: 800px; color: white; box-shadow: 0 20px 40px rgba(0,0,0,0.6);">
            <h3 style="margin: 0 0 20px 0; font-family: sans-serif;">🖼️ Wähle einen Hintergrund</h3>

            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;">
                <div v-for="img in galleryImages" :key="img" @click="setBackground(img)"
                     style="height: 140px; border-radius: 8px; cursor: pointer; background-size: cover; background-position: center; border: 2px solid transparent; transition: border-color 0.2s;"
                     onmouseover="this.style.borderColor='#10b981'" onmouseout="this.style.borderColor='transparent'"
                     :style="{ backgroundImage: 'url(' + img + ')' }">
                </div>
            </div>

            <div style="margin-top: 25px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 0.9rem; color: #aaa;">Bilder von Unsplash</span>
                <div style="display: flex; gap: 10px;">
                    <button @click="removeBackground" style="padding: 10px 16px; background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; border-radius: 6px; cursor: pointer;">🗑️ Ohne Bild</button>
                    <button @click="showGallery = false" style="padding: 10px 16px; background: transparent; border: 1px solid #555; color: white; border-radius: 6px; cursor: pointer;">Abbrechen</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="widgets/uhr.js"></script>
<script src="widgets/notiz.js"></script>
<script src="widgets/countdown.js"></script>
<script src="widgets/stoppuhr.js"></script>
<script src="app.js"></script>

</body>
</html>
