name: Deploy Board to Server

# Startet automatisch, wenn du etwas in den "main" Branch pushst
on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🚀 Copy files via SSH
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "." # Nimmt alle Dateien aus diesem Repository
          target: "/var/www/html/board" # WICHTIG: Ändere dies zu deinem Ordner auf dem Server!
          rm: true # Löscht alte Dateien auf dem Server vor dem Kopieren (optional, hält es sauber)